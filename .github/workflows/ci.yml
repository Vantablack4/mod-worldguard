name: Mod CI

on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - ".github/**"
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main, master]
    paths-ignore:
      - ".github/**"
      - "**/*.md"
      - "docs/**"

concurrency:
  group: mod-worldguard-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew build
